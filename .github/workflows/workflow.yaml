name: Build

on:
  push:
    branches: [ "master" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Install JDK"
        uses: actions/setup-java@v5
        with:
          cache: "maven"
          distribution: "temurin"
          java-version: "25"

      - name: "Package"
        run: mvn -B clean package
